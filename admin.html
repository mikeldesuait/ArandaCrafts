<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Acceso gerente | Aranda Crafts</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #fef9f2 0%, #ffede1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 48px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #ffe1c4;
    }
    .login-card h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #d47b3a, #b95f2a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-card p {
      color: #b78f6e;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .login-card input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 60px;
      border: 1px solid #ffe1c4;
      background: #fefaf5;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
    }
    .login-card button {
      width: 100%;
      background: #d47b3a;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .login-card button:hover { background: #b95f2a; transform: scale(1.02); }
    .login-card button:disabled { background: #cbad93; cursor: not-allowed; }
    .error { color: #c16e3a; margin-top: 16px; font-size: 0.8rem; }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #b78f6e;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-card">
  <h1>🌸 Aranda Crafts</h1>
  <p>acceso para el equipo</p>
  <input type="email" id="email" placeholder="Email" autocomplete="email">
  <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
  <button id="loginBtn">Entrar al panel</button>
  <div id="errorMsg" class="error"></div>
  <a href="./" class="back-link">← Volver a la tienda</a>
</div>

<script>
  // ==========================================
  //  CONFIGURACIÓN
  // ==========================================
  const SUPABASE_URL = "https://nccggkkxezbrydeyzyko.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1uOhbiY9pDQ4k4q0Lz7wpg_7c6ykx7p";
  
  let supabaseClient = null;
  let products = [];
  let currentEditingId = null;
  let currentEditingImageFile = null;
  let currentFilter = "todos";
  
  // Modo admin
  const urlParams = new URLSearchParams(window.location.search);
  const IS_ADMIN_MODE = (urlParams.get('admin') === 'true');
  window.isAdmin = IS_ADMIN_MODE;
  
  if (IS_ADMIN_MODE) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  // ==========================================
  //  EJEMPLOS INICIALES (sin columna categoria)
  // ==========================================
  const ejemplos = [
    { nombre_es: "Camiseta 'Arte Flow'", precio: 22.90, icono: "fa-tshirt" },
    { nombre_es: "Taza 'Brillo Creativo'", precio: 14.50, icono: "fa-mug-hot" },
    { nombre_es: "Botella térmica personalizada", precio: 19.90, icono: "fa-water-bottle" },
    { nombre_es: "Llavero acrílico con nombre", precio: 6.90, icono: "fa-key" },
    { nombre_es: "Marcapáginas grabado láser", precio: 5.90, icono: "fa-bookmark" },
    { nombre_es: "Grabado láser en madera (15cm)", precio: 18.0, icono: "fa-crown" },
    { nombre_es: "Sudadera oversize 'Esencia'", precio: 32.0, icono: "fa-tshirt" },
    { nombre_es: "Pack 2 tazas 'Amistad'", precio: 26.90, icono: "fa-mug-hot" }
  ];

  // ==========================================
  //  FUNCIONES PRINCIPALES
  // ==========================================
  async function uploadImage(file, productId) {
    if (!file) return null;
    
    console.log("📤 Subiendo imagen:", file.name);
    
    try {
      const fileExt = file.name.split('.').pop();
      const fileName = `${productId}_${Date.now()}.${fileExt}`;
      
      const { data, error } = await supabaseClient.storage
        .from('productos')
        .upload(fileName, file, { cacheControl: '3600', upsert: true });
      
      if (error) throw error;
      
      console.log("✅ Imagen subida");
      
      const { data: urlData } = supabaseClient.storage
        .from('productos')
        .getPublicUrl(fileName);
      
      return urlData.publicUrl;
      
    } catch (err) {
      console.error("❌ Error subiendo imagen:", err);
      alert("Error al subir imagen: " + err.message);
      return null;
    }
  }

  async function seedEjemplos() {
    const { count } = await supabaseClient.from('productos').select('*', { count: 'exact', head: true });
    if (count === 0) {
      for (let ex of ejemplos) {
        await supabaseClient.from('productos').insert([{ ...ex, activo: true }]);
      }
      console.log("📦 Ejemplos insertados");
    }
  }

  async function loadProducts() {
    const { data } = await supabaseClient.from('productos').select('*').order('id', { ascending: false });
    products = data || [];
    renderFeed();
    console.log(`📦 ${products.length} productos cargados`);
  }

  async function deleteProduct(id) {
    if (confirm("¿Eliminar esta creación?")) {
      await supabaseClient.from('productos').delete().eq('id', id);
      loadProducts();
    }
  }

  async function updateProduct(id, updates) {
    console.log("🔄 Actualizando producto:", id, updates);
    const { error } = await supabaseClient
      .from('productos')
      .update(updates)
      .eq('id', id);
    
    if (error) {
      console.error("❌ Error:", error);
      throw error;
    }
    console.log("✅ Producto actualizado");
  }

  async function addProduct(data) {
    const { data: newProduct, error } = await supabaseClient
      .from('productos')
      .insert([{ ...data, activo: true }])
      .select();
    
    if (error) throw error;
    return newProduct[0];
  }

  // ==========================================
  //  RENDERIZADO
  // ==========================================
  function renderStories() {
    const cats = [
      { id: 'todos', name: 'Todo', icon: 'fa-heart' },
      { id: 'textil', name: 'Camisetas', icon: 'fa-tshirt' },
      { id: 'sublimacion', name: 'Tazas/Botellas', icon: 'fa-mug-hot' },
      { id: 'artesania', name: 'Llaveros', icon: 'fa-key' },
      { id: 'laser', name: 'Láser', icon: 'fa-crown' }
    ];
    document.getElementById("storiesTrack").innerHTML = cats.map(c => `
      <div class="story-circle" onclick="filterByCategory('${c.id}')">
        <div class="ring"><i class="fas ${c.icon}"></i></div>
        <div class="story-label">${c.name}</div>
      </div>
    `).join('');
  }

  window.filterByCategory = function(cat) { 
    currentFilter = cat; 
    renderFeed(); 
  };

  function getProductCategory(product) {
    const name = (product.nombre_es || product.nombre || "").toLowerCase();
    if (name.includes('camiseta') || name.includes('sudadera')) return 'textil';
    if (name.includes('taza') || name.includes('botella')) return 'sublimacion';
    if (name.includes('llavero') || name.includes('marcapaginas')) return 'artesania';
    if (name.includes('grabado') || name.includes('láser')) return 'laser';
    return 'todos';
  }

  function renderFeed() {
    const container = document.getElementById("feedContainer");
    let filtered = currentFilter === "todos" ? products : products.filter(p => getProductCategory(p) === currentFilter);
    if (!filtered.length) {
      container.innerHTML = `<div style="text-align:center; padding:40px;">🌸 Aún no hay productos. ${window.isAdmin ? 'Toca el botón + para empezar' : 'Vuelve pronto'}</div>`;
      return;
    }
    container.innerHTML = "";
    filtered.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card" + (window.isAdmin ? " editable" : "");
      if (window.isAdmin) card.onclick = () => openEdit(p);
      const displayName = p.nombre_es || p.nombre || "Creación artesanal";
      const icono = p.icono || 'fa-star';
      card.innerHTML = `
        <div class="card-img">
          ${p.imagen_url ? `<img src="${p.imagen_url}" alt="${escapeHtml(displayName)}">` : `<i class="fas ${icono}"></i>`}
        </div>
        <div class="card-info">
          <div class="product-name">${escapeHtml(displayName)}</div>
          <div class="product-price">${p.precio} €</div>
          <div class="badge-craft"><i class="fas fa-hands"></i> hecho a mano</div>
          <button class="btn-personalizar" onclick="event.stopPropagation(); alert('✨ Personalizar ${escapeHtml(displayName)} · ${p.precio}€\\n📧 Escríbenos para empezar')">Quiero personalizar ✨</button>
          ${window.isAdmin ? `<button class="btn-personalizar" style="background:#c96f3a; margin-top:8px;" onclick="event.stopPropagation(); deleteProduct(${p.id})"><i class="fas fa-trash-alt"></i> Eliminar</button>` : ''}
        </div>
      `;
      container.appendChild(card);
    });
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  // ==========================================
  //  MODALES
  // ==========================================
  function openEdit(prod) {
    currentEditingId = prod.id;
    document.getElementById("editName").value = prod.nombre_es || "";
    document.getElementById("editPrice").value = prod.precio;
    document.getElementById("editIcon").value = prod.icono || "";
    
    const previewDiv = document.getElementById("editImagePreview");
    if (prod.imagen_url) {
      previewDiv.innerHTML = `<img src="${prod.imagen_url}" alt="Vista previa">`;
    } else {
      previewDiv.innerHTML = `<i class="fas fa-image"></i>`;
    }
    document.getElementById("editImageFile").value = "";
    currentEditingImageFile = null;
    document.getElementById("editModal").style.display = "flex";
  }

  document.getElementById("editImageFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) {
      currentEditingImageFile = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById("editImagePreview").innerHTML = `<img src="${ev.target.result}" alt="Vista previa">`;
      };
      reader.readAsDataURL(currentEditingImageFile);
    }
  });

  window.saveCurrentProduct = async function() {
    const name = document.getElementById("editName").value.trim();
    const price = parseFloat(document.getElementById("editPrice").value);
    const icon = document.getElementById("editIcon").value.trim();
    
    if (!name || isNaN(price)) { 
      alert("Completa nombre y precio"); 
      return; 
    }
    
    try {
      let imagenUrl = null;
      if (currentEditingImageFile) {
        imagenUrl = await uploadImage(currentEditingImageFile, currentEditingId);
      }
      
      const updates = { nombre_es: name, precio: price, icono: icon };
      if (imagenUrl) updates.imagen_url = imagenUrl;
      
      await updateProduct(currentEditingId, updates);
      alert("✅ Producto actualizado");
      closeModal();
      await loadProducts();
      
    } catch (err) {
      console.error("Error:", err);
      alert("Error al guardar: " + err.message);
    }
  };

  window.closeModal = function() { 
    document.getElementById("editModal").style.display = "none"; 
    currentEditingImageFile = null;
  };

  window.openAddModal = function() { 
    document.getElementById("addModal").style.display = "flex"; 
  };
  
  window.closeAddModal = function() { 
    document.getElementById("addModal").style.display = "none";
    document.getElementById("addImageFile").value = "";
    document.getElementById("addImagePreview").innerHTML = `<i class="fas fa-image"></i>`;
  };

  document.getElementById("addImageFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById("addImagePreview").innerHTML = `<img src="${ev.target.result}" alt="Vista previa">`;
      };
      reader.readAsDataURL(e.target.files[0]);
    }
  });

  window.createNewProduct = async function() {
    const name = document.getElementById("addName").value.trim();
    const price = parseFloat(document.getElementById("addPrice").value);
    const icon = document.getElementById("addIcon").value.trim() || "fa-heart";
    const imageFile = document.getElementById("addImageFile").files[0];
    
    if (!name || isNaN(price)) { 
      alert("Completa nombre y precio"); 
      return; 
    }
    
    try {
      const newProduct = await addProduct({ nombre_es: name, precio: price, icono: icon });
      console.log("✅ Producto creado, ID:", newProduct.id);
      
      if (imageFile && newProduct) {
        const imagenUrl = await uploadImage(imageFile, newProduct.id);
        if (imagenUrl) {
          await updateProduct(newProduct.id, { imagen_url: imagenUrl });
          console.log("✅ Imagen asignada");
        }
      }
      
      closeAddModal();
      document.getElementById("addName").value = "";
      document.getElementById("addPrice").value = "";
      document.getElementById("addImageFile").value = "";
      document.getElementById("addImagePreview").innerHTML = `<i class="fas fa-image"></i>`;
      await loadProducts();
      alert("✅ Producto creado correctamente");
      
    } catch (err) {
      console.error("❌ Error:", err);
      alert("Error al crear producto: " + err.message);
    }
  };

  // ==========================================
  //  LOGOUT Y UI
  // ==========================================
  window.logout = async function() {
    if (supabaseClient) await supabaseClient.auth.signOut();
    window.location.href = window.location.pathname;
  };

  async function updateUI() {
    const authDiv = document.getElementById("authButtons");
    const fab = document.getElementById("fabCreateBtn");
    
    if (window.isAdmin) {
      authDiv.innerHTML = `<div style="display:flex; gap:8px;"><span style="background:#d47b3a; padding:5px 15px; border-radius:40px; color:white; font-weight:600;">🌸 Tati</span><button class="icon-soft" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>`;
      fab.style.display = "flex";
      console.log("👑 Modo ADMIN activado");
    } else {
      authDiv.innerHTML = `<a href="admin.html" class="icon-soft"><i class="fas fa-user-circle"></i></a>`;
      fab.style.display = "none";
      console.log("👤 Modo cliente");
    }
  }

  // ==========================================
  //  INICIALIZACIÓN
  // ==========================================
  async function init() {
    console.log("🚀 Iniciando app...");
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await seedEjemplos();
    await loadProducts();
    renderStories();
    await updateUI();
    
    document.getElementById("fabCreateBtn").onclick = () => openAddModal();
  }

  window.onclick = (e) => { 
    if (e.target.classList.contains('modal-overlay')) e.target.style.display = "none"; 
  };
  
  init();
</script>
</body>
</html>
