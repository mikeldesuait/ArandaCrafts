<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Acceso gerente | Aranda Crafts</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #fef9f2 0%, #ffede1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 48px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #ffe1c4;
    }
    .login-card h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #d47b3a, #b95f2a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-card p {
      color: #b78f6e;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .login-card input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 60px;
      border: 1px solid #ffe1c4;
      background: #fefaf5;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
    }
    .login-card button {
      width: 100%;
      background: #d47b3a;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .login-card button:hover { background: #b95f2a; transform: scale(1.02); }
    .login-card button:disabled { background: #cbad93; cursor: not-allowed; }
    .error { color: #c16e3a; margin-top: 16px; font-size: 0.8rem; }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #b78f6e;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-card">
  <h1>🌸 Aranda Crafts</h1>
  <p>acceso para el equipo</p>
  <input type="email" id="email" placeholder="Email" autocomplete="email">
  <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
  <button id="loginBtn">Entrar al panel</button>
  <div id="errorMsg" class="error"></div>
  <div id="debugInfo" style="font-size:0.7rem; color:#888; margin-top:16px;"></div>
  <a href="./" class="back-link">← Volver a la tienda</a>
</div>

<script>
  const SUPABASE_URL = "https://nccggkkxezbrydeyzyko.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1uOhbiY9pDQ4k4q0Lz7wpg_7c6ykx7p";
  
  let supabase;

  function logDebug(msg) {
    console.log(msg);
    const debugDiv = document.getElementById("debugInfo");
    if (debugDiv) debugDiv.innerHTML += msg + "<br>";
  }

  async function initSupabase() {
    logDebug("1. Iniciando Supabase...");
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    logDebug("2. Verificando sesión existente...");
    const { data: { session } } = await supabase.auth.getSession();
    logDebug("3. Sesión: " + (session ? "activa" : "no activa"));
    
    if (session) {
      logDebug("4. Obteniendo perfil del usuario...");
      const { data: perfil, error } = await supabase
        .from('perfiles')
        .select('rol')
        .eq('id', session.user.id)
        .single();
      
      if (error) logDebug("4b. Error perfil: " + error.message);
      logDebug("5. Rol: " + (perfil?.rol || "ninguno"));
      
      if (perfil?.rol === 'gerente') {
        const basePath = window.location.pathname.replace("/admin.html", "");
        const redirectUrl = basePath + "?admin=true";
        logDebug("6. Redirigiendo a: " + redirectUrl);
        window.location.href = redirectUrl;
      } else {
        logDebug("5b. No es gerente, sesión ignorada");
      }
    } else {
      logDebug("No hay sesión activa, esperando login");
    }
  }

  async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    
    errorDiv.innerHTML = "";
    logDebug("🔐 Intentando login con: " + email);
    
    if (!email || !password) {
      errorDiv.innerText = "❌ Completa ambos campos";
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Verificando...';
    
    try {
      logDebug("7. Llamando a signInWithPassword...");
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });
      
      if (error) {
        logDebug("8. Error auth: " + error.message);
        throw error;
      }
      
      logDebug("9. Login exitoso, usuario ID: " + data.user.id);
      
      logDebug("10. Verificando rol en perfiles...");
      const { data: perfil, error: perfilError } = await supabase
        .from('perfiles')
        .select('rol')
        .eq('id', data.user.id)
        .single();
      
      if (perfilError) {
        logDebug("11. Error perfil: " + perfilError.message);
        throw new Error("Error al verificar permisos");
      }
      
      logDebug("12. Rol obtenido: " + perfil?.rol);
      
      if (perfil?.rol !== 'gerente') {
        logDebug("13. No es gerente, cerrando sesión...");
        await supabase.auth.signOut();
        throw new Error("No tienes permisos de administración");
      }
      
      const basePath = window.location.pathname.replace("/admin.html", "");
      const redirectUrl = basePath + "?admin=true";
      logDebug("14. Redirigiendo a: " + redirectUrl);
      window.location.href = redirectUrl;
      
    } catch (err) {
      console.error("Error:", err);
      errorDiv.innerText = "❌ " + (err.message || "Email o contraseña incorrectos");
      loginBtn.disabled = false;
      loginBtn.innerHTML = "Entrar al panel";
    }
  }
  
  // Asignar evento cuando el DOM esté listo
  document.addEventListener("DOMContentLoaded", () => {
    logDebug("DOM cargado");
    initSupabase();
    document.getElementById("loginBtn").addEventListener("click", login);
  });
</script>
</body>
</html>
