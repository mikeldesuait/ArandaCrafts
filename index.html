<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Aranda Crafts | Personaliza con arte</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Quicksand', sans-serif; 
    background: #fef9f2; 
    color: #2d2a24; 
    scroll-behavior: smooth;
    overflow-x: hidden;
    width: 100%;
  }

  /* ========== HEADER DINÁMICO ========== */
  .dynamic-header {
    position: sticky;
    top: 0;
    z-index: 100;
    transition: all 0.3s ease;
    width: 100%;
  }

  .main-header {
    background: rgba(255, 250, 240, 0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #ffe1c4;
    transition: all 0.3s ease;
    padding: 16px 16px;
    width: 100%;
  }

  .main-header.large {
    padding: 20px 16px;
  }
  .main-header.large .logo-area h1 {
    font-size: 1.8rem;
  }
  .main-header.large .logo-area p {
    font-size: 0.65rem;
    opacity: 1;
  }

  .main-header.small {
    padding: 8px 16px;
  }
  .main-header.small .logo-area h1 {
    font-size: 1.3rem;
  }
  .main-header.small .logo-area p {
    font-size: 0.55rem;
    opacity: 0.7;
  }
  .main-header.small .icon-soft {
    width: 36px;
    height: 36px;
    font-size: 1rem;
  }

  .logo-area {
    text-align: center;
    transition: all 0.3s ease;
  }
  .logo-area h1 {
    font-weight: 800;
    background: linear-gradient(135deg, #d47b3a, #b95f2a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    transition: all 0.3s ease;
  }
  .logo-area p {
    color: #b78f6e;
    letter-spacing: 1.5px;
    transition: all 0.3s ease;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 6px;
    transition: all 0.3s ease;
  }
  .main-header.small .header-actions {
    margin-top: 0;
  }

  .icon-soft {
    background: #fff1e6;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    color: #c16e3a;
    transition: all 0.2s;
    width: 42px;
    height: 42px;
  }
  .icon-soft:hover { background: #c16e3a; color: white; }

  /* ========== STORIES - RESPONSIVE ========== */
  .stories-wrapper {
    position: sticky;
    top: 70px;
    z-index: 99;
    background: #fef9f2;
    border-bottom: 1px solid #ffe1c4;
    transition: top 0.3s ease;
    width: 100%;
  }
  .stories-wrapper.sticky-top {
    top: 56px;
  }

  /* MÓVIL: scroll horizontal, elementos a la izquierda */
  .stories-scroll { 
    overflow-x: auto; 
    white-space: nowrap; 
    padding: 12px 16px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }
  .stories-scroll::-webkit-scrollbar {
    height: 3px;
  }
  .stories-track { 
    display: inline-flex; 
    gap: 20px;
  }
  
  /* ESCRITORIO: centrado y sin scroll */
  @media (min-width: 768px) {
    .stories-scroll {
      overflow-x: visible;
      white-space: normal;
      display: flex;
      justify-content: center;
      padding: 12px 20px;
    }
    .stories-track {
      flex-wrap: wrap;
      justify-content: center;
    }
  }
  
  .story-circle { 
    display: inline-flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 6px; 
    cursor: pointer; 
  }
  .ring { 
    width: 60px; 
    height: 60px; 
    background: #ffe1c4; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all 0.2s; 
  }
  .ring i { font-size: 1.6rem; color: #c16e3a; }
  .story-label { font-size: 0.65rem; font-weight: 600; color: #6b4c30; }

  /* ========== HERO ========== */
  .hero-gentle { 
    padding: 40px 16px; 
    text-align: center; 
    background: linear-gradient(145deg, #fff5eb 0%, #ffede1 100%);
    width: 100%;
  }
  .hero-gentle h2 { font-size: 1.6rem; font-weight: 700; color: #3b2c21; }
  .hero-gentle span { color: #d47b3a; }
  .hero-gentle p { margin-top: 12px; max-width: 320px; margin-left: auto; margin-right: auto; color: #8f735b; }

  /* ========== FEED Y PRODUCTOS ========== */
  .feed-container { 
    width: 100%; 
    max-width: 1300px; 
    margin: 0 auto; 
    padding: 20px 16px;
    overflow-x: hidden;
  }
  .products-grid { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    gap: 24px; 
    align-items: flex-start; 
    width: 100%;
  }
  .product-card {
    background: white; 
    border-radius: 28px; 
    overflow: hidden; 
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    border: 1px solid #ffe1c4; 
    transition: all 0.2s; 
    width: 280px; 
    flex-shrink: 0;
  }
  .product-card.editable { border: 2px solid #d47b3a; cursor: pointer; }
  
  @media (max-width: 640px) {
    .product-card { 
      width: 100%; 
      max-width: 100%;
      flex-shrink: 1;
    }
  }
  
  .card-img { width: 100%; aspect-ratio: 1/1; background: #fff8f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img i { font-size: 3rem; color: #dc9a6e; display: block; }
  
  .card-info { padding: 18px; text-align: center; }
  .product-name { font-weight: 800; font-size: 1rem; line-height: 1.3; text-align: center; margin-bottom: 8px; }
  .product-price { color: #c16e3a; font-weight: 800; margin: 12px 0; font-size: 1.5rem; text-align: center; letter-spacing: -0.5px; }
  .badge-craft { background: #fff1e6; color: #c16e3a; display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; margin: 8px auto; text-align: center; }
  
  .product-description { font-size: 0.8rem; color: #555; line-height: 1.4; margin: 10px 0; text-align: left; }
  .product-description .short-text { display: inline; }
  .product-description .full-text { display: none; }
  .product-description .read-more-btn { background: none; border: none; color: #c16e3a; font-weight: 700; cursor: pointer; font-size: 0.7rem; padding: 0; font-family: 'Quicksand', sans-serif; }
  .product-description .read-more-btn:hover { text-decoration: underline; }
  
  .like-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 15px 0 12px 0; padding: 10px 0; border-top: 1px solid #ffe1c4; border-bottom: 1px solid #ffe1c4; background: #fefaf5; border-radius: 60px; }
  .like-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; color: #888; }
  .like-btn.liked { color: #e74c3c; transform: scale(1.1); }
  .like-btn:hover { transform: scale(1.15); }
  .like-count { font-size: 0.85rem; color: #555; font-weight: 600; }
  
  .btn-personalizar { background: #d47b3a; color: white; border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 800; font-family: 'Quicksand', sans-serif; margin-top: 12px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-personalizar:hover { background: #b95f2a; transform: scale(1.02); }
  
  /* ========== BOTÓN FLOTANTE ========== */
  .fab-create { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: #d47b3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; box-shadow: 0 6px 14px rgba(0,0,0,0.1); cursor: pointer; border: none; z-index: 90; transition: all 0.2s; }
  .fab-create:hover { transform: scale(1.05); background: #b95f2a; }
  
  /* ========== MODALES ========== */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 200; padding: 20px; }
  .modal-card { background: white; border-radius: 36px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; border: 1px solid #ffe1c4; }
  .modal-card h3 { margin-bottom: 20px; color: #b95f2a; }
  .modal-card input, .modal-card select, .modal-card textarea { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 30px; border: 1px solid #ffe1c4; background: #fefaf5; font-family: 'Quicksand', sans-serif; }
  .img-preview { width: 100%; aspect-ratio: 1/1; background: #f5efe8; border-radius: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview i { font-size: 2rem; color: #c16e3a; }
  .btn-primary { background: #d47b3a; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
  .btn-secondary { background: #efe3d8; color: #5e3e26; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; }
  .btn-deepseek { background: #2c3e50; color: white; border: none; padding: 10px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 0.8rem; margin-bottom: 16px; width: 100%; }
  
  /* ========== FOOTER ========== */
  footer { text-align: center; padding: 30px 16px; color: #cbad93; font-size: 0.7rem; border-top: 1px solid #ffe1c4; width: 100%; }
</style>
</head>
<body>

<div class="dynamic-header">
  <div class="main-header large" id="mainHeader">
    <div class="logo-area">
      <h1>Aranda Crafts</h1>
      <p>arte personalizado con alma</p>
    </div>
    <div class="header-actions" id="authButtons"></div>
  </div>

  <!-- Stories fijas al scroll -->
  <div class="stories-wrapper" id="storiesWrapper">
    <div class="stories-scroll">
      <div class="stories-track" id="storiesTrack"></div>
    </div>
  </div>
</div>

<div class="hero-gentle">
  <h2>Tu idea, <span>hecha pieza única</span></h2>
  <p>Vinilo · Sublimación · DTF · Láser Xtool · Artesanía menuda</p>
</div>

<div class="feed-container">
  <div class="products-grid" id="feedContainer">
    <div style="text-align:center; padding:40px;">🌸 Cargando creaciones...</div>
  </div>
</div>

<button id="fabCreateBtn" class="fab-create" style="display: none;">+</button>

<!-- MODALES (igual que antes) -->
<div id="editModal" class="modal-overlay">
  <div class="modal-card">
    <h3>✏️ Editar pieza</h3>
    <div class="img-preview" id="editImagePreview"><i class="fas fa-image"></i></div>
    <input type="file" id="editImageFile" accept="image/*">
    <input type="text" id="editName" placeholder="Nombre del producto">
    <input type="text" id="editPrice" placeholder="Precio (€)">
    <textarea id="editDescription" placeholder="Descripción (copywriting potente)" rows="3"></textarea>
    <button class="btn-deepseek" id="improveEditBtn">✨ Mejorar descripción con IA</button>
    <input type="text" id="editIcon" placeholder="Icono (fallback)">
    <select id="editCategory">
      <option value="textil">👕 Camisetas y ropa</option>
      <option value="sublimacion">☕ Tazas / Botellas / Copas</option>
      <option value="artesania">🔑 Llaveros / Marcapáginas</option>
      <option value="laser">⚡ Grabado láser Xtool</option>
    </select>
    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:8px;">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCurrentProduct()">Guardar</button>
    </div>
  </div>
</div>

<div id="addModal" class="modal-overlay">
  <div class="modal-card">
    <h3>➕ Nueva creación</h3>
    <div class="img-preview" id="addImagePreview"><i class="fas fa-image"></i></div>
    <input type="file" id="addImageFile" accept="image/*">
    <input type="text" id="addName" placeholder="Nombre del producto">
    <input type="text" id="addPrice" placeholder="Precio (€)">
    <textarea id="addDescription" placeholder="Descripción (copywriting potente)" rows="3"></textarea>
    <button class="btn-deepseek" id="improveAddBtn">✨ Mejorar descripción con IA</button>
    <input type="text" id="addIcon" placeholder="Icono (fallback)" value="fa-heart">
    <select id="addCategory">
      <option value="textil">👕 Camisetas y ropa</option>
      <option value="sublimacion">☕ Tazas / Botellas / Copas</option>
      <option value="artesania">🔑 Llaveros / Marcapáginas</option>
      <option value="laser">⚡ Grabado láser Xtool</option>
    </select>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-primary" onclick="createNewProduct()">Crear producto</button>
    </div>
  </div>
</div>

<footer>
  <p>💛 Hecho con dedicación · Cada pieza cuenta una historia</p>
</footer>

<script>
  const SUPABASE_URL = "https://nccggkkxezbrydeyzyko.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1uOhbiY9pDQ4k4q0Lz7wpg_7c6ykx7p";
  
  let supabaseClient = null;
  let products = [];
  let currentEditingId = null;
  let currentEditingImageFile = null;
  let currentFilter = "todos";
  
  const urlParams = new URLSearchParams(window.location.search);
  const IS_ADMIN_MODE = (urlParams.get('admin') === 'true');
  window.isAdmin = IS_ADMIN_MODE;
  
  if (IS_ADMIN_MODE) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  // ========== HEADER DINÁMICO AL SCROLL ==========
  function initScrollHeader() {
    const mainHeader = document.getElementById('mainHeader');
    const storiesWrapper = document.getElementById('storiesWrapper');
    let lastScroll = 0;
    
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      
      if (currentScroll > 50) {
        mainHeader.classList.add('small');
        mainHeader.classList.remove('large');
        storiesWrapper.classList.add('sticky-top');
      } else {
        mainHeader.classList.add('large');
        mainHeader.classList.remove('small');
        storiesWrapper.classList.remove('sticky-top');
      }
      lastScroll = currentScroll;
    });
  }

  // ========== EDGE FUNCTION ==========
  async function improveDescription(mode) {
    const textareaId = mode === 'edit' ? 'editDescription' : 'addDescription';
    const currentText = document.getElementById(textareaId).value;
    const productName = mode === 'edit' ? document.getElementById("editName").value : document.getElementById("addName").value;
    
    if (!currentText && !productName) {
      alert("Escribe una descripción básica o el nombre del producto para mejorar.");
      return;
    }
    
    const btn = document.getElementById(mode === 'edit' ? 'improveEditBtn' : 'improveAddBtn');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generando...';
    btn.disabled = true;
    
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (!session) {
        alert("❌ Debes iniciar sesión como gerente para usar esta función.");
        return;
      }
      
      const functionUrl = `${SUPABASE_URL}/functions/v1/improve-description`;
      
      const response = await fetch(functionUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ 
          text: currentText, 
          productName: productName 
        })
      });
      
      const data = await response.json();
      
      if (!response.ok || data.error) {
        throw new Error(data.error || `Error HTTP: ${response.status}`);
      }
      
      document.getElementById(textareaId).value = data.improved;
      alert("✅ Descripción mejorada con IA");
      
    } catch (err) {
      console.error("Error:", err);
      alert("Error al mejorar la descripción: " + err.message);
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  // ========== CRUD ==========
  async function uploadImage(file, productId) {
    if (!file) return null;
    const fileExt = file.name.split('.').pop();
    const fileName = `${productId}_${Date.now()}.${fileExt}`;
    const { error } = await supabaseClient.storage.from('productos').upload(fileName, file);
    if (error) throw error;
    const { data } = supabaseClient.storage.from('productos').getPublicUrl(fileName);
    return data.publicUrl;
  }

  async function loadProducts() {
    const { data } = await supabaseClient.from('productos').select('*').order('id', { ascending: false });
    products = data || [];
    renderFeed();
  }

  async function updateProduct(id, updates) {
    const { error } = await supabaseClient.from('productos').update(updates).eq('id', id);
    if (error) throw error;
  }

  async function addProduct(data) {
    const { data: newProduct, error } = await supabaseClient.from('productos').insert([{ ...data, activo: true, likes: 0 }]).select();
    if (error) throw error;
    return newProduct[0];
  }

  async function deleteProduct(id) {
    if (confirm("¿Eliminar esta creación?")) {
      await supabaseClient.from('productos').delete().eq('id', id);
      loadProducts();
    }
  }

  async function addLike(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    const newLikes = (product.likes || 0) + 1;
    await supabaseClient.from('productos').update({ likes: newLikes }).eq('id', productId);
    product.likes = newLikes;
    renderFeed();
  }

  // ========== RENDER ==========
  function renderStories() {
    const cats = [
      { id: 'todos', name: 'Todo', icon: 'fa-heart' },
      { id: 'textil', name: 'Camisetas', icon: 'fa-tshirt' },
      { id: 'sublimacion', name: 'Tazas/Botellas', icon: 'fa-mug-hot' },
      { id: 'artesania', name: 'Llaveros', icon: 'fa-key' },
      { id: 'laser', name: 'Láser', icon: 'fa-crown' }
    ];
    document.getElementById("storiesTrack").innerHTML = cats.map(c => `
      <div class="story-circle" onclick="filterByCategory('${c.id}')">
        <div class="ring"><i class="fas ${c.icon}"></i></div>
        <div class="story-label">${c.name}</div>
      </div>
    `).join('');
  }

  window.filterByCategory = function(cat) { currentFilter = cat; renderFeed(); };

  window.toggleDescription = function(btn) {
    const container = btn.parentElement;
    const short = container.querySelector('.short-text');
    const full = container.querySelector('.full-text');
    if (full.style.display === 'none' || !full.style.display) {
      full.style.display = 'inline';
      short.style.display = 'none';
      btn.textContent = 'Leer menos';
    } else {
      full.style.display = 'none';
      short.style.display = 'inline';
      btn.textContent = 'Leer más';
    }
  };

  function renderDescription(text) {
    if (!text) return '';
    const words = text.split(' ');
    if (words.length <= 20) {
      return `<div class="product-description">${escapeHtml(text)}</div>`;
    }
    const shortText = words.slice(0, 20).join(' ') + '...';
    return `
      <div class="product-description">
        <span class="short-text">${escapeHtml(shortText)}</span>
        <span class="full-text">${escapeHtml(text)}</span>
        <button class="read-more-btn" onclick="toggleDescription(this)">Leer más</button>
      </div>
    `;
  }

  function renderFeed() {
    const container = document.getElementById("feedContainer");
    let filtered = currentFilter === "todos" ? products : products.filter(p => p.categoria === currentFilter);
    if (!filtered.length) {
      container.innerHTML = `<div style="text-align:center; padding:40px;">🌸 Aún no hay productos. ${window.isAdmin ? 'Toca el botón + para empezar' : 'Vuelve pronto'}</div>`;
      return;
    }
    container.innerHTML = "";
    filtered.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card" + (window.isAdmin ? " editable" : "");
      if (window.isAdmin) card.onclick = () => openEdit(p);
      const iconMap = { textil: 'fa-tshirt', sublimacion: 'fa-mug-hot', artesania: 'fa-key', laser: 'fa-crown' };
      const fallbackIcon = p.icono || iconMap[p.categoria] || 'fa-star';
      
      card.innerHTML = `
        <div class="card-img">
          ${p.imagen_url ? `<img src="${p.imagen_url}" alt="${escapeHtml(p.nombre_es)}">` : `<i class="fas ${fallbackIcon}"></i>`}
        </div>
        <div class="card-info">
          <div class="product-name">${escapeHtml(p.nombre_es || 'Creación artesanal')}</div>
          <div class="product-price">${p.precio} €</div>
          ${renderDescription(p.descripcion_es)}
          <div class="badge-craft"><i class="fas fa-hands"></i> hecho a mano</div>
          <div class="like-container">
            ${!window.isAdmin ? `<button class="like-btn" onclick="event.stopPropagation(); addLike(${p.id})"><i class="far fa-heart"></i></button>` : `<span>❤️</span>`}
            <span class="like-count">${p.likes || 0} ${!window.isAdmin ? 'personas les gusta' : 'me gusta'}</span>
          </div>
          <button class="btn-personalizar" onclick="event.stopPropagation(); alert('✨ Personalizar ${escapeHtml(p.nombre_es)} · ${p.precio}€\\n📧 Escríbenos para empezar')">Quiero personalizar ✨</button>
          ${window.isAdmin ? `<button class="btn-personalizar" style="background:#c96f3a; margin-top:8px;" onclick="event.stopPropagation(); deleteProduct(${p.id})"><i class="fas fa-trash-alt"></i> Eliminar</button>` : ''}
        </div>
      `;
      container.appendChild(card);
    });
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  // ========== MODALES ==========
  function openEdit(prod) {
    currentEditingId = prod.id;
    document.getElementById("editName").value = prod.nombre_es || "";
    document.getElementById("editPrice").value = prod.precio;
    document.getElementById("editDescription").value = prod.descripcion_es || "";
    document.getElementById("editIcon").value = prod.icono || "";
    document.getElementById("editCategory").value = prod.categoria || "";
    const previewDiv = document.getElementById("editImagePreview");
    previewDiv.innerHTML = prod.imagen_url ? `<img src="${prod.imagen_url}">` : `<i class="fas fa-image"></i>`;
    document.getElementById("editImageFile").value = "";
    currentEditingImageFile = null;
    document.getElementById("editModal").style.display = "flex";
  }

  document.getElementById("editImageFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) {
      currentEditingImageFile = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => document.getElementById("editImagePreview").innerHTML = `<img src="${ev.target.result}">`;
      reader.readAsDataURL(currentEditingImageFile);
    }
  });

  window.saveCurrentProduct = async function() {
    const name = document.getElementById("editName").value.trim();
    const price = parseFloat(document.getElementById("editPrice").value);
    const description = document.getElementById("editDescription").value.trim();
    const icon = document.getElementById("editIcon").value.trim();
    const category = document.getElementById("editCategory").value;
    if (!name || isNaN(price)) { alert("Completa nombre y precio"); return; }
    try {
      let imagenUrl = null;
      if (currentEditingImageFile) imagenUrl = await uploadImage(currentEditingImageFile, currentEditingId);
      const updates = { nombre_es: name, precio: price, descripcion_es: description, icono: icon, categoria: category };
      if (imagenUrl) updates.imagen_url = imagenUrl;
      await updateProduct(currentEditingId, updates);
      alert("✅ Producto actualizado");
      closeModal();
      await loadProducts();
    } catch (err) { alert("Error: " + err.message); }
  };

  window.closeModal = function() { document.getElementById("editModal").style.display = "none"; };
  window.openAddModal = function() { document.getElementById("addModal").style.display = "flex"; };
  window.closeAddModal = function() { document.getElementById("addModal").style.display = "none"; document.getElementById("addImageFile").value = ""; document.getElementById("addImagePreview").innerHTML = `<i class="fas fa-image"></i>`; };

  document.getElementById("addImageFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) {
      const reader = new FileReader();
      reader.onload = (ev) => document.getElementById("addImagePreview").innerHTML = `<img src="${ev.target.result}">`;
      reader.readAsDataURL(e.target.files[0]);
    }
  });

  window.createNewProduct = async function() {
    const name = document.getElementById("addName").value.trim();
    const price = parseFloat(document.getElementById("addPrice").value);
    const description = document.getElementById("addDescription").value.trim();
    const icon = document.getElementById("addIcon").value.trim() || "fa-heart";
    const category = document.getElementById("addCategory").value;
    const imageFile = document.getElementById("addImageFile").files[0];
    if (!name || isNaN(price)) { alert("Completa nombre y precio"); return; }
    try {
      const newProduct = await addProduct({ nombre_es: name, precio: price, descripcion_es: description, icono: icon, categoria: category });
      if (imageFile && newProduct) {
        const imagenUrl = await uploadImage(imageFile, newProduct.id);
        if (imagenUrl) await updateProduct(newProduct.id, { imagen_url: imagenUrl });
      }
      closeAddModal();
      document.getElementById("addName").value = "";
      document.getElementById("addPrice").value = "";
      await loadProducts();
      alert("✅ Producto creado");
    } catch (err) { alert("Error: " + err.message); }
  };

  window.logout = async function() { await supabaseClient.auth.signOut(); window.location.href = window.location.pathname; };
  window.addLike = addLike;

  // ========== UI ==========
  async function updateUI() {
    const authDiv = document.getElementById("authButtons");
    const fab = document.getElementById("fabCreateBtn");
    if (window.isAdmin) {
      authDiv.innerHTML = `<div style="display:flex; gap:8px;"><span style="background:#d47b3a; padding:5px 15px; border-radius:40px; color:white; font-weight:600;">🌸 Tati</span><button class="icon-soft" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>`;
      fab.style.display = "flex";
    } else {
      authDiv.innerHTML = `<a href="admin.html" class="icon-soft"><i class="fas fa-user-circle"></i></a>`;
      fab.style.display = "none";
    }
  }

  // ========== INIT ==========
  async function init() {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await loadProducts();
    renderStories();
    await updateUI();
    initScrollHeader();
    document.getElementById("fabCreateBtn").onclick = () => openAddModal();
    document.getElementById("improveEditBtn").onclick = () => improveDescription('edit');
    document.getElementById("improveAddBtn").onclick = () => improveDescription('add');
  }

  window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) e.target.style.display = "none"; };
  init();
</script>
</body>
</html>
