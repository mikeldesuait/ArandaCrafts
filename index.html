<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Aranda Crafts | Personaliza con arte</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: #fef9f2; color: #2d2a24; scroll-behavior: smooth; }

    .soft-header {
      position: sticky; top: 0; background: rgba(255, 250, 240, 0.96); backdrop-filter: blur(12px);
      padding: 16px 20px; display: flex; flex-direction: column; align-items: center;
      border-bottom: 1px solid #ffe1c4; z-index: 100;
    }
    .logo-area h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #d47b3a, #b95f2a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-area p { font-size: 0.7rem; color: #b78f6e; letter-spacing: 1.5px; }
    .header-actions { display: flex; gap: 12px; justify-content: center; margin-top: 6px; }
    .icon-soft { width: 42px; height: 42px; background: #fff1e6; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: #c16e3a; font-size: 1.2rem; transition: all 0.2s; }
    .icon-soft:hover { background: #c16e3a; color: white; }

    .hero-gentle { padding: 40px 20px; text-align: center; background: linear-gradient(145deg, #fff5eb 0%, #ffede1 100%); }
    .hero-gentle h2 { font-size: 1.8rem; font-weight: 700; color: #3b2c21; }
    .hero-gentle span { color: #d47b3a; }
    .hero-gentle p { margin-top: 12px; max-width: 320px; margin-left: auto; margin-right: auto; color: #8f735b; }

    .stories-scroll { overflow-x: auto; white-space: nowrap; padding: 20px 16px; scrollbar-width: thin; }
    .stories-track { display: inline-flex; gap: 20px; }
    .story-circle { display: inline-flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
    .ring { width: 72px; height: 72px; background: #ffe1c4; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .ring i { font-size: 2rem; color: #c16e3a; }
    .story-label { font-size: 0.7rem; font-weight: 600; color: #6b4c30; }

    .feed-container { max-width: 550px; margin: 0 auto; padding: 16px; }
    .product-card { background: white; border-radius: 32px; margin-bottom: 24px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,0.03); border: 1px solid #ffe1c4; transition: all 0.2s; }
    .product-card.editable { border: 2px solid #d47b3a; cursor: pointer; }
    .card-img { width: 100%; aspect-ratio: 1/1; background: #fff8f0; display: flex; align-items: center; justify-content: center; }
    .card-img i { font-size: 3.5rem; color: #dc9a6e; }
    .card-info { padding: 18px; }
    .product-name { font-weight: 700; font-size: 1.1rem; }
    .product-price { color: #c16e3a; font-weight: 800; margin: 8px 0; }
    .badge-craft { background: #fff1e6; color: #c16e3a; display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; margin: 8px 0; }
    .btn-personalizar { background: #d47b3a; color: white; border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 700; font-family: 'Quicksand', sans-serif; margin-top: 12px; cursor: pointer; }

    .fab-create { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: #d47b3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; box-shadow: 0 6px 14px rgba(0,0,0,0.1); cursor: pointer; border: none; z-index: 90; transition: all 0.2s; }
    .fab-create:hover { transform: scale(1.05); background: #b95f2a; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 200; padding: 20px; }
    .modal-card { background: white; border-radius: 36px; max-width: 450px; width: 100%; padding: 28px; border: 1px solid #ffe1c4; }
    .modal-card h3 { margin-bottom: 20px; color: #b95f2a; }
    .modal-card input, .modal-card select { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 30px; border: 1px solid #ffe1c4; background: #fefaf5; font-family: 'Quicksand', sans-serif; }
    .btn-primary { background: #d47b3a; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: #efe3d8; color: #5e3e26; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
    footer { text-align: center; padding: 30px; color: #cbad93; font-size: 0.7rem; border-top: 1px solid #ffe1c4; }
  </style>
</head>
<body>

<div class="soft-header">
  <div class="logo-area">
    <h1>Aranda Crafts</h1>
    <p>arte personalizado con alma</p>
  </div>
  <div class="header-actions" id="authButtons"></div>
</div>

<div class="hero-gentle">
  <h2>Tu idea, <span>hecha pieza única</span></h2>
  <p>Vinilo · Sublimación · DTF · Láser Xtool · Artesanía menuda</p>
</div>

<div class="stories-scroll">
  <div class="stories-track" id="storiesTrack"></div>
</div>

<div class="feed-container" id="feedContainer">
  <div style="text-align:center; padding:40px;">🌸 Cargando creaciones...</div>
</div>

<button id="fabCreateBtn" class="fab-create" style="display: none;">+</button>

<!-- MODALES -->
<div id="editModal" class="modal-overlay">
  <div class="modal-card">
    <h3>✏️ Editar pieza</h3>
    <input type="text" id="editName" placeholder="Nombre del producto">
    <input type="text" id="editPrice" placeholder="Precio (€)">
    <input type="text" id="editIcon" placeholder="Icono (fa-tshirt, fa-mug-hot, fa-key, fa-crown)">
    <select id="editCategory">
      <option value="textil">👕 Camisetas y ropa</option>
      <option value="sublimacion">☕ Tazas / Botellas / Copas</option>
      <option value="artesania">🔑 Llaveros / Marcapáginas</option>
      <option value="laser">⚡ Grabado láser Xtool</option>
    </select>
    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:8px;">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCurrentProduct()">Guardar</button>
    </div>
  </div>
</div>

<div id="addModal" class="modal-overlay">
  <div class="modal-card">
    <h3>➕ Nueva creación</h3>
    <input type="text" id="addName" placeholder="Nombre del producto">
    <input type="text" id="addPrice" placeholder="Precio (€)">
    <input type="text" id="addIcon" placeholder="Icono (ej: fa-tshirt)" value="fa-heart">
    <select id="addCategory">
      <option value="textil">👕 Camisetas y ropa</option>
      <option value="sublimacion">☕ Tazas / Botellas / Copas</option>
      <option value="artesania">🔑 Llaveros / Marcapáginas</option>
      <option value="laser">⚡ Grabado láser Xtool</option>
    </select>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-primary" onclick="createNewProduct()">Crear producto</button>
    </div>
  </div>
</div>

<footer>
  <p>💛 Hecho con dedicación · Cada pieza cuenta una historia</p>
</footer>

<script>
  // Configuración
  const SUPABASE_URL = "https://nccggkkxezbrydeyzyko.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1uOhbiY9pDQ4k4q0Lz7wpg_7c6ykx7p";
  
  let supabaseClient = null;
  let products = [];
  let isAdmin = false;
  let currentEditingId = null;
  let currentFilter = "todos";

  // Detectar modo admin (por parámetro URL)
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('admin') === 'true') {
    isAdmin = true;
    console.log("✅ Modo admin activado por URL");
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const ejemplos = [
    { nombre_es: "Camiseta 'Arte Flow'", precio: 22.90, icono: "fa-tshirt", categoria: "textil" },
    { nombre_es: "Taza 'Brillo Creativo'", precio: 14.50, icono: "fa-mug-hot", categoria: "sublimacion" },
    { nombre_es: "Botella térmica personalizada", precio: 19.90, icono: "fa-water-bottle", categoria: "sublimacion" },
    { nombre_es: "Llavero acrílico con nombre", precio: 6.90, icono: "fa-key", categoria: "artesania" },
    { nombre_es: "Marcapáginas grabado láser", precio: 5.90, icono: "fa-bookmark", categoria: "artesania" },
    { nombre_es: "Grabado láser en madera (15cm)", precio: 18.0, icono: "fa-crown", categoria: "laser" },
    { nombre_es: "Sudadera oversize 'Esencia'", precio: 32.0, icono: "fa-tshirt", categoria: "textil" },
    { nombre_es: "Pack 2 tazas 'Amistad'", precio: 26.90, icono: "fa-mug-hot", categoria: "sublimacion" }
  ];

  async function seedEjemplos() {
    const { count } = await supabaseClient.from('productos').select('*', { count: 'exact', head: true });
    if (count === 0) {
      for (let ex of ejemplos) await supabaseClient.from('productos').insert([{ ...ex, activo: true }]);
      console.log("📦 Ejemplos insertados");
    }
  }

  async function loadProducts() {
    const { data } = await supabaseClient.from('productos').select('*').order('id', { ascending: false });
    products = data || [];
    renderFeed();
    console.log(`📦 ${products.length} productos cargados`);
  }

  async function deleteProduct(id) {
    if (confirm("¿Eliminar esta creación?")) {
      await supabaseClient.from('productos').delete().eq('id', id);
      loadProducts();
    }
  }

  async function updateProduct(id, updates) {
    await supabaseClient.from('productos').update(updates).eq('id', id);
    loadProducts();
  }

  async function addProduct(data) {
    await supabaseClient.from('productos').insert([{ ...data, activo: true }]);
    loadProducts();
  }

  function renderStories() {
    const cats = [
      { id: 'todos', name: 'Todo', icon: 'fa-heart' },
      { id: 'textil', name: 'Camisetas', icon: 'fa-tshirt' },
      { id: 'sublimacion', name: 'Tazas/Botellas', icon: 'fa-mug-hot' },
      { id: 'artesania', name: 'Llaveros', icon: 'fa-key' },
      { id: 'laser', name: 'Láser', icon: 'fa-crown' }
    ];
    document.getElementById("storiesTrack").innerHTML = cats.map(c => `
      <div class="story-circle" onclick="filterByCategory('${c.id}')">
        <div class="ring"><i class="fas ${c.icon}"></i></div>
        <div class="story-label">${c.name}</div>
      </div>
    `).join('');
  }

  function filterByCategory(cat) { currentFilter = cat; renderFeed(); }

  function renderFeed() {
    const container = document.getElementById("feedContainer");
    let filtered = currentFilter === "todos" ? products : products.filter(p => p.categoria === currentFilter);
    if (!filtered.length) {
      container.innerHTML = `<div style="text-align:center; padding:40px;">🌸 Aún no hay productos. ${isAdmin ? 'Toca el botón + para empezar' : 'Vuelve pronto'}</div>`;
      return;
    }
    container.innerHTML = "";
    filtered.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card" + (isAdmin ? " editable" : "");
      if (isAdmin) card.onclick = () => openEdit(p);
      const iconMap = { textil: 'fa-tshirt', sublimacion: 'fa-mug-hot', artesania: 'fa-key', laser: 'fa-crown' };
      const icono = p.icono || iconMap[p.categoria] || 'fa-star';
      card.innerHTML = `
        <div class="card-img"><i class="fas ${icono}"></i></div>
        <div class="card-info">
          <div class="product-name">${escapeHtml(p.nombre_es || 'Creación artesanal')}</div>
          <div class="product-price">${p.precio} €</div>
          <div class="badge-craft"><i class="fas fa-hands"></i> hecho a mano</div>
          <button class="btn-personalizar" onclick="event.stopPropagation(); alert('✨ Personalizar ${escapeHtml(p.nombre_es)} · ${p.precio}€\\n📧 Escríbenos para empezar')">Quiero personalizar ✨</button>
          ${isAdmin ? `<button class="btn-personalizar" style="background:#c96f3a; margin-top:8px;" onclick="event.stopPropagation(); deleteProduct(${p.id})"><i class="fas fa-trash-alt"></i> Eliminar</button>` : ''}
        </div>
      `;
      container.appendChild(card);
    });
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  function openEdit(prod) {
    currentEditingId = prod.id;
    document.getElementById("editName").value = prod.nombre_es || "";
    document.getElementById("editPrice").value = prod.precio;
    document.getElementById("editIcon").value = prod.icono || "";
    document.getElementById("editCategory").value = prod.categoria || "";
    document.getElementById("editModal").style.display = "flex";
  }

  async function saveCurrentProduct() {
    await updateProduct(currentEditingId, {
      nombre_es: document.getElementById("editName").value,
      precio: parseFloat(document.getElementById("editPrice").value),
      icono: document.getElementById("editIcon").value,
      categoria: document.getElementById("editCategory").value
    });
    closeModal();
  }

  function closeModal() { document.getElementById("editModal").style.display = "none"; }

  document.getElementById("fabCreateBtn").onclick = () => document.getElementById("addModal").style.display = "flex";
  function closeAddModal() { document.getElementById("addModal").style.display = "none"; }

  async function createNewProduct() {
    await addProduct({
      nombre_es: document.getElementById("addName").value,
      precio: parseFloat(document.getElementById("addPrice").value),
      icono: document.getElementById("addIcon").value,
      categoria: document.getElementById("addCategory").value
    });
    closeAddModal();
    document.getElementById("addName").value = "";
    document.getElementById("addPrice").value = "";
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = window.location.pathname;
  }

  async function updateUI() {
    const authDiv = document.getElementById("authButtons");
    const fab = document.getElementById("fabCreateBtn");
    
    if (isAdmin) {
      authDiv.innerHTML = `<div style="display:flex; gap:8px;"><span style="background:#d47b3a; padding:5px 15px; border-radius:40px; color:white; font-weight:600;">🌸 Tati</span><button class="icon-soft" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>`;
      fab.style.display = "flex";
      console.log("👑 UI en modo admin");
    } else {
      authDiv.innerHTML = `<a href="admin.html" class="icon-soft"><i class="fas fa-user-circle"></i></a>`;
      fab.style.display = "none";
      console.log("👤 UI en modo cliente");
    }
  }

  async function init() {
    console.log("🚀 Iniciando app...");
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await seedEjemplos();
    await loadProducts();
    renderStories();
    await updateUI();
  }

  window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) e.target.style.display = "none"; };
  init();
</script>
</body>
</html>
